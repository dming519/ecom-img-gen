name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Pages and Worker
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: 775719ba23401f136e5bea06f5788465
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build Pages
        run: npm run build

      - name: Deploy Pages
        run: |
          COMMIT_MESSAGE="$(git log -1 --pretty=%s)"
          npx wrangler pages deploy dist \
            --project-name ecom-img-gen \
            --branch "$GITHUB_REF_NAME" \
            --commit-hash "$GITHUB_SHA" \
            --commit-message "$COMMIT_MESSAGE"

      - name: Deploy Worker
        run: npx wrangler deploy --config worker/wrangler.toml
