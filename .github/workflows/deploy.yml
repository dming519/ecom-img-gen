name: Validate

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: validate-main
  cancel-in-progress: false

jobs:
  validate:
    name: Type Check and Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build Pages
        run: npm run build
